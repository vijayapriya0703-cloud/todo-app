<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>📝 My To-Do App</h1>
      <button class="dark-toggle" onclick="toggleDark()">🌙 Dark Mode</button>
    </div>

    <!-- Task Counter -->
    <div class="counter" id="counter">0 tasks remaining</div>

    <!-- Add Task Area -->
    <div class="add-task-box">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      
      <select id="prioritySelect">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>

      <select id="categorySelect">
        <option value="general">📌 General</option>
        <option value="work">💼 Work</option>
        <option value="personal">👤 Personal</option>
        <option value="shopping">🛒 Shopping</option>
      </select>

      <input type="date" id="dueDateInput" />

      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search tasks..." oninput="searchTasks()" />
    </div>

    <!-- Filter Buttons -->
    <div class="filters">
      <button onclick="filterTasks('all')" class="active" id="filter-all">All</button>
      <button onclick="filterTasks('active')" id="filter-active">Active</button>
      <button onclick="filterTasks('done')" id="filter-done">Completed</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Clear Completed -->
    <div class="bottom-bar">
      <button class="clear-btn" onclick="clearCompleted()">🗑️ Clear Completed</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
